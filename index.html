<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Strategist</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px 100px; /* Reduced top padding to move logo up */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 300;
            text-align: center;
            background-color: #002AE7;
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 500px;
            height: auto;
            margin-bottom: 60px;
        }

        .content-text {
            font-size: 17px;
            line-height: 1.5;
            max-width: 600px;
            margin-bottom: 50px;
            letter-spacing: 0.01em;
        }

        .content-text p {
            margin-bottom: 24px;
        }

        .discord-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 28px;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .discord-link:hover {
            background: white;
            color: #002AE7;
        }

        .discord-icon {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }

        .discord-link:hover .discord-icon {
            filter: invert(19%) sepia(91%) saturate(3585%) hue-rotate(224deg) brightness(91%) contrast(108%);
        }

        @media (max-width: 600px) {
            .logo {
                width: 90%;
            }
            .content-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="The Next Strategist Logo" class="logo">

    <div class="content-text">
        <p>
            The Next Strategist continua ad innovare <br>
            l’approccio alla mentorship.
        </p>
        <p>
            L’organizzazione è in procinto <br>
            di diventare una DAO.
        </p>
        <p>
            Da oggi tutte le interazioni <br>
            con i mentor disponibili avverranno <br>
            attraverso il nostro server Discord.
        </p>
    </div>

    <a href="https://discord.gg/8B97MzKC92" class="discord-link" target="_blank">
        <img src="https://cdn.simpleicons.org/discord" alt="Discord" class="discord-icon">
        <span>Join the Discord</span>
    </a>

</body>
</html>
