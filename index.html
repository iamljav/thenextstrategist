<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Strategist</title>
    <style>
        body {
            margin: 0;
            padding: 80px 20px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 300;
            text-align: center;
            background-color: #002AE7;
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 220px;
            height: auto;
            margin-bottom: 50px;
        }

        .content-text {
            font-size: 20px;
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .discord-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        .discord-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            /* This filter turns the black SVG icon to white */
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="The Next Strategist Logo" class="logo">

    <div class="content-text">
        [Insert your text here]
    </div>

    <a href="https://discord.gg/your-invite-code" class="discord-link">
        <img src="https://cdn.simpleicons.org/discord" alt="Discord" class="discord-icon">
        <span>Join the Discord</span>
    </a>

</body>
</html>
