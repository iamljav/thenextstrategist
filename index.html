<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Strategist</title>
    <style>
        body {
            margin: 0;
            padding: 100px 20px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 300;
            text-align: center;
            background-color: #002AE7;
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 500px;
            height: auto;
            margin-bottom: 60px;
        }

        .content-text {
            font-size: 18px;
            line-height: 1.6;
            max-width: 500px;
            margin-bottom: 40px;
            letter-spacing: 0.02em;
        }

        .discord-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 28px;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .discord-link:hover {
            background: white;
            color: #002AE7;
        }

        .discord-icon {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }

        .discord-link:hover .discord-icon {
            /* Matches icon color to the background blue on hover */
            filter: invert(19%) sepia(91%) saturate(3585%) hue-rotate(224deg) brightness(91%) contrast(108%);
        }

        /* Responsive adjustment for mobile screens */
        @media (max-width: 600px) {
            .logo {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="The Next Strategist Logo" class="logo">

    <div class="content-text">
        Strategic research and development.
    </div>

    <a href="https://discord.gg/8B97MzKC92" class="discord-link" target="_blank">
        <img src="https://cdn.simpleicons.org/discord" alt="Discord" class="discord-icon">
        <span>Join the Discord</span>
    </a>

</body>
</html>
